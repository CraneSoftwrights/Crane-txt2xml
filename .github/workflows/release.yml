name: Create Release

# =============================================================================
# Create Release
# =============================================================================
#
# Invocation:
#   Automatically triggered on every push to the `main` branch. There is no
#   manual workflow_dispatch trigger configured; to produce a new release,
#   push a commit (typically a version bump) to main.
#
# Preconditions (job aborts if not met):
#   - Exactly one file matching `version-*.md` must exist at the repository
#     root. VERSION is parsed from the filename itself, e.g.
#     `version-1.4.0.md` -> VERSION="1.4.0". Zero or multiple matches fail
#     the job before anything is built.
#   - No GitHub release may already exist for tag `v<VERSION>`. This guards
#     against silently overwriting a prior release if the version file
#     wasn't bumped.
#
# What it does:
#   1. Checks out the repository.
#   2. Derives VERSION from the version-*.md filename.
#   3. Confirms tag v<VERSION> does not already exist as a release.
#   4. Copies the working tree (rsync, excluding dotfiles/dotdirs) into
#      build/Crane-txt2xml-v<VERSION>/.
#   5. Zips that directory to build/Crane-txt2xml-v<VERSION>.zip.
#   6. Duplicates that zip as build/Crane-txt2xml-latest.zip (stable name).
#   7. Publishes a GitHub Release tagged v<VERSION>, attaching both zips.
#
# Produces:
#   A GitHub Release named "Crane-txt2xml v<VERSION>", tag v<VERSION>,
#   with two downloadable assets:
#     - Crane-txt2xml-v<VERSION>.zip   permanent, version-specific
#     - Crane-txt2xml-latest.zip       overwritten each release, stable URL
#
# Next steps after a release is produced:
#   - Check the Releases page to confirm the assets and notes look right.
#   - Update any external docs/pages that link to a specific version or to
#     the -latest URL.
#   - Replace/rename version-*.md to the next version string before the
#     next push to main -- this workflow will refuse to run again for the
#     *same* version because of the tag-existence check.
#
# Permissions:
#   - `contents: write` is required at job level for softprops/action-gh-
#     release@v2 to create the release and upload assets via the REST API.
#     Without it, GITHUB_TOKEN defaults to read-only and the release step
#     fails with HTTP 403 "Resource not accessible by integration".
#
# Disabled/inactive:
#   - Lines building a .tar.gz "mac-use-wget-or-curl" artefact are commented
#     out throughout (prep, packaging, -latest duplication, release upload).
#     Uncomment all four matching lines together if that secondary
#     distribution format is reinstated.
#
# =============================================================================

on:
  push:
    branches:
      - main

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sanity check version file
        id: check_version
        run: |
          FILES=(version-*.md)
          COUNT=${#FILES[@]}
          if [[ $COUNT -ne 1 ]]; then
            echo "ERROR: Expected exactly one version-*.md file, found $COUNT"
            exit 1
          fi
          VERSION_FILE="${FILES[0]}"
          VERSION="${VERSION_FILE#version-}"
          VERSION="${VERSION%.md}"
          echo "INFO: Found version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check release tag availability
        run: |
          VERSION="v${{ steps.check_version.outputs.VERSION }}"
          echo "INFO: Checking for existing GitHub release: $VERSION"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "ERROR: Release tag $VERSION already exists"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release directory
        run: |
          echo "INFO: Preparing release directory"
          mkdir -p build/Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}
          rsync -a --exclude='.*' ./ build/Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}/

      - name: Create ZIP package
        run: |
          echo "INFO: Creating ZIP package"
          cd build
          zip -r Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}.zip Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}
          # tar -czf Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}--mac-use-wget-or-curl.tar.gz Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}

      - name: Duplicate with -latest filenames
        run: |
          echo "INFO: Duplicating artefacts with stable -latest filenames"
          cp build/Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}.zip build/Crane-txt2xml-latest.zip
          # cp build/Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}--mac-use-wget-or-curl.tar.gz build/Crane-txt2xml-latest--mac-use-wget-or-curl.tgz

      - name: Release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check_version.outputs.VERSION }}
          name: Crane-txt2xml v${{ steps.check_version.outputs.VERSION }}
          files: |
            build/Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}.zip
            # build/Crane-txt2xml-v${{ steps.check_version.outputs.VERSION }}--mac-use-wget-or-curl.tar.gz
            build/Crane-txt2xml-latest.zip
            #build/Crane-txt2xml-latest--mac-use-wget-or-curl.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}